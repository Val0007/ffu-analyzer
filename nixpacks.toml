[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.build]
cmds = [
  "cd frontend && npm install",
  "cd frontend && npm run build",
  "python3 -m venv /app/venv",
  "/app/venv/bin/pip install fastapi uvicorn openai pymupdf4llm python-dotenv"
]

[start]
cmd = "cd backend && /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"