[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip", "gcc", "mupdf"]

[phases.build]
cmds = [
  "cd frontend && npm install",
  "cd frontend && npm run build",
  "pip3 install fastapi uvicorn openai pymupdf4llm python-dotenv"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"